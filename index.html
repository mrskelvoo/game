<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>game</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            background-color: yellowgreen;
        }
        .enemi{
            margin: 0;
            padding: 0;
            position: absolute;
            height: 75px;
            width: 75px;
            background: rgb(0, 89, 255);
            border: 3px solid blue;
            border-radius: 999px;
            cursor: pointer;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        #yeuxl{
            position: absolute;
            left: 10px;
            top: 20px;
            height: 8px;
            width: 8px;
            background: rgb(0, 0, 0);
            border: 5px solid white;
        }
        #yeuxll{
            position: absolute;
            right: 10px;
            top: 20px;
            height: 8px;
            width: 8px;
            background: rgb(0, 0, 0);
            border: 5px solid white;
        }
        #bh{
            position: absolute;
            right: 50%;
            transform: translateX(50%);
            top: 50px;
            height: 8px;
            width: 40px;
            background: rgb(0, 13, 129);
        }
        h1{
            position: fixed;
            top: 20px;
            right: 80px;
            font-family: fantasy;
        }
    </style>
</head>
<body>
    <div class="enemi">
        <div id="yeuxl"></div>
        <div id="yeuxll"></div>
        <div id="bh"></div>
    </div>
    <h1>Score:</h1>
    
    <script>
        const enemi = document.querySelector(".enemi")
        let score = document.querySelector("h1")
        let compteur = 0;
        function nombre_aleatoire(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        enemi.addEventListener("click", () =>{
            enemi.style.left = nombre_aleatoire(0, 90) + "vw";
            enemi.style.top = nombre_aleatoire(0, 80) + "vh";
            compteur++;
            score.textContent = "Score: " + compteur;
            if (compteur === 50) {
                alert("score 50 ateint!")
            }
            if (compteur === 106) {
                alert("... wtf")
            }
            
        })

    </script>
</body>
</html>
