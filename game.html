<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>game</title>
    <style>
        body{
            background-color: rgb(34, 34, 34);
        }
        .screen{
            position: fixed;
            width: 80vw;
            height: 80vh;
            background-color: black;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 20px;
            box-shadow: 1px 1px 40px rgba(255, 255, 255, 0.404);
        }
        input{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 50px;
            font-size: 15px;
            border-radius: 20px;
            
        }
    </style>
</head>
<body>
    <div class="screen"><input type="number"></div>
</body>
</html>
